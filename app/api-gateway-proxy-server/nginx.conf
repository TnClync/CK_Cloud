events {}

http {
    upstream frontend {
        server web-frontend-server1:80;   # Nếu bạn chưa có service này thì tạm comment hoặc thay bằng tên container thực tế
        server web-frontend-server2:80;
    }

    upstream backend {
        server application-backend-server:8081;
    }

    upstream keycloak {
        server authentication-identity-server:8080;
    }

    server {
        listen 80;

        # Root - phục vụ frontend tĩnh
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Keycloak (quan trọng - bỏ /auth ở proxy_pass vì Keycloak chạy ở root)
        location /auth/ {
            proxy_pass http://keycloak/;          # ← Sửa thành này (không có /auth/ ở cuối)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Nếu muốn truy cập Keycloak trực tiếp mà không qua /auth/
        location /keycloak/ {
            proxy_pass http://keycloak/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}