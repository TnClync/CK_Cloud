version: "3.9"

networks:
  cloud-net:
    name: cloud-net

services:

# ================= FRONTEND SERVER =================

  web-frontend-server:
    build: ./web-frontend-server
    image: hotensv/web:dev
    container_name: web-frontend-server
    ports:
      - "8080:80"
    networks:
      - cloud-net
    restart: unless-stopped


  web-frontend-server1:
    build: ./web-frontend-server1
    image: hotensv/web1:dev
    container_name: web-frontend-server1
    networks:
      - cloud-net
    restart: unless-stopped

  web-frontend-server2:
    build: ./web-frontend-server2
    image: hotensv/web2:dev
    container_name: web-frontend-server2
    networks:
      - cloud-net
    restart: unless-stopped

# ================= API GATEWAY =================

  api-gateway-proxy-server:
    image: nginx:stable
    container_name: api-gateway-proxy-server
    ports:
      - "80:80"
    volumes:
      - ./api-gateway-proxy-server/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cloud-net
    restart: unless-stopped


# ================= BACKEND SERVER =================

  application-backend-server:
    build: ./application-backend-server
    image: hotensv/app:dev
    container_name: application-backend-server
    ports:
      - "8085:8081"
    environment:
      OIDC_ISSUER: "http://18.136.123.73:8081/realms/realm_sv512h0156_sv523h0191"
      OIDC_AUDIENCE: "account"
    networks:
      - cloud-net
    restart: unless-stopped


# ================= DATABASE =================

  relational-database-server:
    image: mariadb:11
    container_name: relational-database-server
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: minicloud
    volumes:
      - ./relational-database-server/init:/docker-entrypoint-initdb.d:ro
    ports: []
    networks:
      - cloud-net
    restart: unless-stopped


# ================= KEYCLOAK =================

  authentication-identity-server:
    image: quay.io/keycloak/keycloak:latest
    container_name: authentication-identity-server
    command: start-dev 
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: 18.136.123.73
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: edge
      KC_PROXY_HEADERS: xforwarded

    ports:
      - "8081:8080"

    volumes:
      - ./keycloak-data:/opt/keycloak/data/

    # entrypoint:
    #   - /bin/bash
    #   - -c
    #   - |
    #     /opt/keycloak/bin/kc.sh start-dev &
    #     echo "Waiting Keycloak start..."
    #     sleep 25

    #     /opt/keycloak/bin/kcadm.sh config credentials \
    #       --server http://localhost:8080 \
    #       --realm master \
    #       --user admin \
    #       --password admin

    #     /opt/keycloak/bin/kcadm.sh update realms/master -s sslRequired=NONE

    #     echo "Keycloak ready"
    #     wait

    networks:
      - cloud-net

    restart: unless-stopped

# ================= MINIO =================

  object-storage-server:
    image: minio/minio
    container_name: object-storage-server
    command: ["server","/data","--console-address",":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./object-storage-server/data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - cloud-net
    restart: unless-stopped

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      - object-storage-server
    networks:
      - cloud-net
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set myminio http://object-storage-server:9000 minioadmin minioadmin &&
      mc mb myminio/profile-pics --ignore-existing &&
      mc mb myminio/documents --ignore-existing &&
      mc anonymous set public myminio/profile-pics &&
      mc anonymous set public myminio/documents &&
      echo '✅ MinIO buckets initialized successfully'
      "

# ================= INTERNAL DNS =================

  internal-dns-server:
    image: internetsystemsconsortium/bind9:9.18
    container_name: internal-dns-server
    ports:
      - "1053:53/udp"
    volumes:
      - ./internal-dns-server:/etc/bind
    networks:
      - cloud-net
    restart: unless-stopped


# ================= NODE EXPORTER =================

  monitoring-node-exporter-server:
    image: prom/node-exporter:latest
    container_name: monitoring-node-exporter-server
    ports:
      - "9100:9100"
    networks:
      - cloud-net
    restart: unless-stopped


# ================= PROMETHEUS =================

  monitoring-prometheus-server:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus-server
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring-prometheus-server/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - cloud-net
    restart: unless-stopped


# ================= GRAFANA =================

  monitoring-grafana-dashboard-server:
    image: grafana/grafana:latest
    container_name: monitoring-grafana-dashboard-server
    ports:
      - "3000:3000"
    networks:
      - cloud-net
    restart: unless-stopped