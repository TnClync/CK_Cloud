<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student CRUD</title>

<style>
body {
  font-family: Arial;
  margin: 40px;
}

input {
  padding: 6px;
  margin: 5px;
}

button {
  padding: 6px 10px;
  margin: 5px;
  cursor: pointer;
}

table {
  border-collapse: collapse;
  margin-top: 20px;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
}

th {
  background: #f2f2f2;
}
</style>
</head>

<body>

<h2>Student CRUD</h2>

<div>
  <input id="student_id" placeholder="Student ID">
  <input id="fullname" placeholder="Full Name">
  <input id="dob" type="date">
  <input id="major" placeholder="Major">

  <button onclick="createStudent()">Add</button>
  <button onclick="updateStudent()">Update</button>
</div>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Student ID</th>
      <th>Name</th>
      <th>DOB</th>
      <th>Major</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>

const API = "http://localhost/api/students-db";

let selectedId = null;
let cache = [];

// ===================== FORMAT DATE =====================
function formatDate(d) {
  if (!d) return "";
  const date = new Date(d);
  if (isNaN(date)) return d;
  return date.toISOString().split("T")[0];
}

// ===================== READ =====================
async function loadStudents() {
  const res = await fetch(API);
  const data = await res.json();

  cache = data;

  const table = document.getElementById("table");
  table.innerHTML = "";

  data.forEach(s => {
    table.innerHTML += `
      <tr>
        <td>${s.id}</td>
        <td>${s.student_id}</td>
        <td>${s.fullname}</td>
        <td>${formatDate(s.dob)}</td>
        <td>${s.major}</td>
        <td>
          <button onclick="editStudent(${s.id})">Edit</button>
          <button onclick="deleteStudent(${s.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

// ===================== CREATE =====================
async function createStudent() {
  const data = {
    student_id: student_id.value,
    fullname: fullname.value,
    dob: dob.value,
    major: major.value
  };

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  loadStudents();
}

// ===================== EDIT =====================
function editStudent(id) {
  const s = cache.find(x => x.id === id);
  if (!s) return;

  selectedId = id;

  student_id.value = s.student_id;
  fullname.value = s.fullname;
  dob.value = formatDate(s.dob);
  major.value = s.major;
}

// ===================== UPDATE =====================
async function updateStudent() {
  if (!selectedId) {
    alert("Select a student first");
    return;
  }

  const data = {
    student_id: student_id.value,
    fullname: fullname.value,
    dob: dob.value,
    major: major.value
  };

  await fetch(`${API}/${selectedId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  selectedId = null;

  // clear form
  student_id.value = "";
  fullname.value = "";
  dob.value = "";
  major.value = "";

  loadStudents();
}

// ===================== DELETE =====================
async function deleteStudent(id) {
  await fetch(`${API}/${id}`, {
    method: "DELETE"
  });

  loadStudents();
}

// INIT
loadStudents();

</script>

</body>
</html>
