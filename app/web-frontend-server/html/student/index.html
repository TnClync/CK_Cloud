<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student CRUD</title>

<style>
body {
  font-family: Arial;
  margin: 40px;
}

input {
  padding: 6px;
  margin: 5px;
}

button {
  padding: 6px 10px;
  margin: 5px;
  cursor: pointer;
}

table {
  border-collapse: collapse;
  margin-top: 20px;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
}

th {
  background: #f2f2f2;
}
</style>
</head>

<body>

<h2>Student CRUD</h2>

<div>
  <input id="student_id" placeholder="Student ID">
  <input id="fullname" placeholder="Full Name">
  <input id="dob" placeholder="DOB (YYYY-MM-DD)">
  <input id="major" placeholder="Major">

  <button onclick="createStudent()">Add</button>
  <button onclick="updateStudent()">Update</button>
</div>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Student ID</th>
      <th>Name</th>
      <th>DOB</th>
      <th>Major</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>

const API = "http://localhost:8085/api/students-db";

let selectedId = null;

// ===================== READ =====================
async function loadStudents() {
  const res = await fetch(API);
  const data = await res.json();

  const table = document.getElementById("table");
  table.innerHTML = "";

  data.forEach(s => {
    table.innerHTML += `
      <tr>
        <td>${s.id}</td>
        <td>${s.student_id}</td>
        <td>${s.fullname}</td>
        <td>${s.dob}</td>
        <td>${s.major}</td>
        <td>
          <button onclick='editStudent(${JSON.stringify(s)})'>Edit</button>
          <button onclick='deleteStudent(${s.id})'>Delete</button>
        </td>
      </tr>
    `;
  });
}

// ===================== CREATE =====================
async function createStudent() {
  const data = {
    student_id: document.getElementById("student_id").value,
    fullname: document.getElementById("fullname").value,
    dob: document.getElementById("dob").value,
    major: document.getElementById("major").value
  };

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  loadStudents();
}

// ===================== EDIT =====================
function editStudent(s) {
  selectedId = s.id;

  document.getElementById("student_id").value = s.student_id;
  document.getElementById("fullname").value = s.fullname;
  document.getElementById("dob").value = s.dob;
  document.getElementById("major").value = s.major;
}

// ===================== UPDATE =====================
async function updateStudent() {
  if (!selectedId) return alert("Select a student first");

  const data = {
    student_id: document.getElementById("student_id").value,
    fullname: document.getElementById("fullname").value,
    dob: document.getElementById("dob").value,
    major: document.getElementById("major").value
  };

  await fetch(`${API}/${selectedId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  selectedId = null;
  loadStudents();
}

// ===================== DELETE =====================
async function deleteStudent(id) {
  await fetch(`${API}/${id}`, {
    method: "DELETE"
  });

  loadStudents();
}

// INIT
loadStudents();

</script>

</body>
</html>
