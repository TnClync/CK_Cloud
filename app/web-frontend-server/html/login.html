<!DOCTYPE html>
<html>
<head>
  <title>MiniCloud Login</title>
</head>
<body>

<h2>Login to MiniCloud</h2>

<input id="username" placeholder="username"><br><br>
<input id="password" type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

<h3 id="result"></h3>

<script src="config.js"></script>

<script>
async function login() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const KEYCLOAK = window.APP_CONFIG?.KEYCLOAK || "http://localhost:8081";
  const API_GATEWAY = window.APP_CONFIG?.API_GATEWAY || "http://localhost:8088";

  const body = new URLSearchParams();
  body.append("username", username);
  body.append("password", password);
  body.append("grant_type", "password");
  body.append("client_id", "myapp");

  const tokenResponse = await fetch(
    KEYCLOAK + "/realms/master/protocol/openid-connect/token",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: body
    }
  );

  if (!tokenResponse.ok) {
    document.getElementById("result").innerText =
      "Keycloak error: " + tokenResponse.status;
    return;
  }

  const tokenData = await tokenResponse.json();

  if (!tokenData.access_token) {
    document.getElementById("result").innerText =
      "Login failed!";
    return;
  }

  const secureResponse = await fetch(
    API_GATEWAY + "/api/secure",
    {
      headers: {
        Authorization: "Bearer " + tokenData.access_token
      }
    }
  );

  const secureData = await secureResponse.json();

  document.getElementById("result").innerText =
    JSON.stringify(secureData, null, 2);
}
</script>

</body>
</html>
